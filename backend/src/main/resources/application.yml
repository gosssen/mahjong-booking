server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:mahjong_db}
    username: ${DB_USER:mahjong}
    password: ${DB_PASS:mahjong123}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

line:
  bot:
    channel-token: ${LINE_CHANNEL_TOKEN}
    channel-secret: ${LINE_CHANNEL_SECRET}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  liff-id: ${LIFF_ID:2009787261-yiDOnOFw}
  initial-admin-user-id: ${INITIAL_ADMIN_USER_ID:}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:https://mahjong-booking.vercel.app}
  rich-menu-id: ${RICH_MENU_ID:}

logging:
  level:
    com.mahjong: DEBUG
