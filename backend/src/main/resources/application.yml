server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mahjong_db}
    username: ${SPRING_DATASOURCE_USERNAME:mahjong}
    password: ${SPRING_DATASOURCE_PASSWORD:mahjong123}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  mvc:
    problemdetails:
      enabled: true   # 啟用 RFC 7807，錯誤訊息放在 detail 欄位

line:
  bot:
    channel-token: ${LINE_CHANNEL_TOKEN}
    channel-secret: ${LINE_CHANNEL_SECRET}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  liff-id: ${LIFF_ID:2009787261-yiDOnOFw}
  initial-admin-user-id: ${INITIAL_ADMIN_USER_ID:}
  developer-user-id: ${DEVELOPER_USER_ID:}    # 開發人員帳號，擁有所有權限且不可被移除/修改
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:https://mahjong-booking.vercel.app}
  rich-menu-id: ${RICH_MENU_ID:}

logging:
  level:
    com.mahjong: DEBUG
