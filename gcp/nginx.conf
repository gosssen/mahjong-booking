# ============================================================
# Nginx 反向代理設定
# 放置路徑：/etc/nginx/sites-available/mahjong-backend
# 啟用：sudo ln -s /etc/nginx/sites-available/mahjong-backend /etc/nginx/sites-enabled/
# SSL 由 certbot 自動填入
# ============================================================

server {
    server_name YOUR_DOMAIN.duckdns.org;   # ← 換成你的 DuckDNS domain

    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    listen 80;
    # certbot 會自動在這裡加入 SSL 設定
}
